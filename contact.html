<!DOCTYPE html>
<html>
    <head>
        <title>Contact Page </title>
        <link href="ccontact.css" type="text/css" rel="stylesheet"/>
    </head>
    <body>
        <h1>Registration Form:</h1><br/><br/><br/><br/><br/>
            <div class="container">
            <div class="left">
            <h3>Contact Us:</h3>
            <div class="box">
                <img src="contact-address.png" width="50px" height="50px">

                <div class="text">
                    <h5>Address</h5>
                    <p>Jordan</p>
                </div>
            </div><br/>
            <div class="box">
                <img src="contact-email2.png" width="50px" height="50px">

                <div class="text">
                    <h5>Email</h5>
                    <p>college@email.com</p>
                </div>
            </div><br/>
            <div class="box">
                <img src="contact-phone.png" width="50px" height="50px">

                <div class="text">
                    <h5>Phone</h5>
                    <p>**********</p>
                </div>
            </div>

            </div>
              <div class="right">
                <div class="field">
                    <label for="name">Name</label><br/>
                    <input type="text" id="name" name="name" placeholder="Your Name">
                </div><br/>

                <div class="field">
                    <label for="email">Email</label><br/>
                    <input type="text" id="id" name="id" placeholder="Your Email">
                </div><br/>
            
            <div class="field">
                <label for="email">Message</label><br/>
                <input type="text" id="mess" name="mess" placeholder="Your Message"><br/>
                <button type="submit">Send</button>
            </div></div>
        </div><br/>
            </form>
    </body>
</html>
